[phases.setup]
nixPkgs = ["nodejs_20", "python312", "postgresql"]

[phases.install]
cmds = ["pip install -r requirements.txt", "cd frontend && npm install"]

[phases.build]
cmds = ["cd frontend && npm run build && cp -r public/* out/"]

[phases.run]
cmd = "uvicorn app:app --host 0.0.0.0 --port $PORT"

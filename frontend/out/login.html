<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile Unlocking Service | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0e1a;
    }

    .bg-gradient {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: linear-gradient(135deg, #0a0e1a 0%, #0f1729 30%, #1a1040 60%, #0c1a2e 100%);
      animation: gradientShift 12s ease-in-out infinite alternate;
    }

    @keyframes gradientShift {
      0% { background: linear-gradient(135deg, #0a0e1a 0%, #0f1729 30%, #1a1040 60%, #0c1a2e 100%); }
      25% { background: linear-gradient(135deg, #0d1225 0%, #151c30 30%, #1f1248 60%, #0e1c32 100%); }
      50% { background: linear-gradient(135deg, #0f0a20 0%, #101828 30%, #1a0f42 60%, #0a1828 100%); }
      75% { background: linear-gradient(135deg, #0b0f1f 0%, #121a2e 30%, #1c1145 60%, #0d1a2c 100%); }
      100% { background: linear-gradient(135deg, #0a0e1a 0%, #0f1729 30%, #1a1040 60%, #0c1a2e 100%); }
    }

    .bg-gradient::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 20% 30%, rgba(99, 102, 241, 0.12) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, rgba(168, 85, 247, 0.10) 0%, transparent 50%),
                  radial-gradient(ellipse at 50% 80%, rgba(6, 182, 212, 0.08) 0%, transparent 50%);
      animation: orbPulse 8s ease-in-out infinite alternate;
    }

    @keyframes orbPulse {
      0% { opacity: 0.6; }
      100% { opacity: 1; }
    }

    .bg-orbs {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      animation: orbFloat 20s ease-in-out infinite;
    }

    .orb:nth-child(1) {
      width: 500px;
      height: 500px;
      background: rgba(99, 102, 241, 0.10);
      top: -10%;
      left: -5%;
      animation-delay: 0s;
      animation-duration: 22s;
    }

    .orb:nth-child(2) {
      width: 400px;
      height: 400px;
      background: rgba(168, 85, 247, 0.08);
      bottom: -8%;
      right: -5%;
      animation-delay: -5s;
      animation-duration: 18s;
    }

    .orb:nth-child(3) {
      width: 350px;
      height: 350px;
      background: rgba(6, 182, 212, 0.07);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: -10s;
      animation-duration: 25s;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(60px, -40px) scale(1.1); }
      50% { transform: translate(-30px, 50px) scale(0.95); }
      75% { transform: translate(40px, 30px) scale(1.05); }
    }

    .liquid-bubbles {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .bubble {
      position: absolute;
      bottom: -80px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.08), rgba(99, 102, 241, 0.06));
      border: 1px solid rgba(255, 255, 255, 0.05);
      animation: bubbleRise linear infinite;
      transform: translateZ(0);
      will-change: transform, opacity;
    }

    .bubble::before {
      content: '';
      position: absolute;
      top: 12%;
      left: 20%;
      width: 30%;
      height: 20%;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), transparent);
      border-radius: 50%;
      transform: rotate(-30deg);
    }

    @keyframes bubbleRise {
      0% {
        transform: translateY(0) translateX(0) scale(1);
        opacity: 0;
      }
      10% {
        opacity: 0.6;
      }
      90% {
        opacity: 0.4;
      }
      100% {
        transform: translateY(-110vh) translateX(var(--drift)) scale(var(--end-scale));
        opacity: 0;
      }
    }

    .main-container {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 20px;
      gap: 60px;
    }

    .phone-wrapper {
      perspective: 1200px;
      display: none;
      flex-shrink: 0;
    }

    .phone-3d {
      width: 220px;
      height: 440px;
      position: relative;
      transform-style: preserve-3d;
      animation: phoneFloat 6s ease-in-out infinite;
    }

    @keyframes phoneFloat {
      0%, 100% { transform: translateY(0) rotateY(-5deg) rotateX(3deg); }
      25% { transform: translateY(-12px) rotateY(3deg) rotateX(-2deg); }
      50% { transform: translateY(0) rotateY(8deg) rotateX(5deg); }
      75% { transform: translateY(-8px) rotateY(-2deg) rotateX(-1deg); }
    }

    .phone-body {
      position: absolute;
      inset: 0;
      border-radius: 30px;
      background: linear-gradient(145deg, rgba(30, 35, 55, 0.9), rgba(15, 18, 35, 0.95));
      border: 2px solid rgba(255, 255, 255, 0.08);
      box-shadow:
        0 25px 60px rgba(0, 0, 0, 0.6),
        0 0 40px rgba(99, 102, 241, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      transform: translateZ(0);
      backdrop-filter: blur(20px);
      overflow: hidden;
    }

    .phone-body::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 30px;
      background: linear-gradient(135deg,
        rgba(99, 102, 241, 0.05) 0%,
        transparent 40%,
        rgba(168, 85, 247, 0.03) 70%,
        transparent 100%);
      pointer-events: none;
    }

    .phone-body::after {
      content: '';
      position: absolute;
      top: -1px;
      left: 20%;
      right: 20%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.3), transparent);
    }

    .phone-notch {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 22px;
      background: #0a0e1a;
      border-radius: 12px;
      z-index: 2;
    }

    .phone-notch::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(30, 35, 55, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .phone-screen {
      position: absolute;
      top: 38px;
      left: 6px;
      right: 6px;
      bottom: 50px;
      border-radius: 18px;
      background: linear-gradient(180deg, #0c1022 0%, #111630 50%, #0c1022 100%);
      overflow: hidden;
      z-index: 1;
    }

    .phone-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(99, 102, 241, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 100%, rgba(168, 85, 247, 0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    .screen-content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .lock-icon {
      width: 36px;
      height: 36px;
      margin-bottom: 12px;
      position: relative;
    }

    .lock-icon svg {
      width: 100%;
      height: 100%;
      fill: none;
      stroke: rgba(99, 102, 241, 0.6);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .unlock-status {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(99, 102, 241, 0.7);
      margin-bottom: 15px;
    }

    .unlock-dots {
      display: flex;
      gap: 6px;
      margin-bottom: 15px;
    }

    .unlock-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(99, 102, 241, 0.15);
      animation: dotPulse 1.5s ease-in-out infinite;
    }

    .unlock-dot:nth-child(1) { animation-delay: 0s; }
    .unlock-dot:nth-child(2) { animation-delay: 0.3s; }
    .unlock-dot:nth-child(3) { animation-delay: 0.6s; }
    .unlock-dot:nth-child(4) { animation-delay: 0.9s; }
    .unlock-dot:nth-child(5) { animation-delay: 1.2s; }

    @keyframes dotPulse {
      0%, 100% {
        background: rgba(99, 102, 241, 0.15);
        transform: scale(1);
        box-shadow: none;
      }
      50% {
        background: rgba(99, 102, 241, 0.8);
        transform: scale(1.4);
        box-shadow: 0 0 8px rgba(99, 102, 241, 0.4);
      }
    }

    .screen-wave {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      overflow: hidden;
    }

    .screen-wave svg {
      width: 100%;
      height: 100%;
    }

    .phone-button {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 90px;
      height: 28px;
      border-radius: 14px;
      background: linear-gradient(145deg, rgba(30, 35, 55, 0.9), rgba(15, 18, 35, 0.95));
      border: 1px solid rgba(255, 255, 255, 0.05);
      z-index: 2;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .phone-button:hover {
      background: linear-gradient(145deg, rgba(40, 45, 70, 0.9), rgba(20, 25, 50, 0.95));
      border-color: rgba(99, 102, 241, 0.2);
    }

    .phone-button-inner {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.08);
    }

    .phone-edge {
      position: absolute;
      border-radius: 30px;
      pointer-events: none;
    }

    .phone-edge-left {
      left: -1px;
      top: 40px;
      bottom: 40px;
      width: 2px;
      background: linear-gradient(180deg, transparent, rgba(99, 102, 241, 0.08), rgba(168, 85, 247, 0.08), transparent);
    }

    .phone-edge-right {
      right: -1px;
      top: 50px;
      bottom: 50px;
      width: 1.5px;
      background: linear-gradient(180deg, transparent, rgba(6, 182, 212, 0.06), transparent);
    }

    .phone-glow {
      position: absolute;
      inset: -3px;
      border-radius: 33px;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.06), rgba(168, 85, 247, 0.06), rgba(6, 182, 212, 0.06));
      filter: blur(8px);
      z-index: -1;
      animation: glowPulse 4s ease-in-out infinite alternate;
    }

    @keyframes glowPulse {
      0% { opacity: 0.5; filter: blur(8px); }
      100% { opacity: 1; filter: blur(12px); }
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      position: relative;
    }

    .login-card-inner {
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01));
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 24px;
      padding: 40px 36px;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 30px 80px rgba(0, 0, 0, 0.4),
        0 0 0 1px rgba(255, 255, 255, 0.02) inset,
        0 0 60px rgba(99, 102, 241, 0.03);
    }

    .login-card-inner::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.06), transparent);
    }

    .login-card-inner::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 24px;
      background: linear-gradient(135deg,
        rgba(99, 102, 241, 0.02) 0%,
        transparent 30%,
        rgba(168, 85, 247, 0.02) 60%,
        transparent 100%);
      pointer-events: none;
    }

    .brand-section {
      text-align: center;
      margin-bottom: 32px;
      position: relative;
      z-index: 1;
    }

    .brand-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 16px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(168, 85, 247, 0.15));
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .brand-icon::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.06), rgba(168, 85, 247, 0.06));
      filter: blur(6px);
      z-index: -1;
      animation: iconGlow 3s ease-in-out infinite alternate;
    }

    @keyframes iconGlow {
      0% { opacity: 0.3; filter: blur(6px); }
      100% { opacity: 0.8; filter: blur(10px); }
    }

    .brand-icon svg {
      width: 28px;
      height: 28px;
    }

    .brand-title {
      font-size: 22px;
      font-weight: 800;
      background: linear-gradient(135deg, #e0e7ff, #a5b4fc, #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .brand-subtitle {
      font-size: 13px;
      font-weight: 400;
      color: rgba(165, 180, 252, 0.5);
      margin-top: 4px;
      letter-spacing: 1px;
    }

    .form-group {
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: rgba(165, 180, 252, 0.6);
      margin-bottom: 6px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: rgba(165, 180, 252, 0.25);
      transition: color 0.3s ease;
      pointer-events: none;
    }

    .input-wrapper:focus-within .input-icon {
      color: rgba(99, 102, 241, 0.6);
    }

    .form-input {
      width: 100%;
      padding: 14px 14px 14px 44px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      color: #e0e7ff;
      font-size: 14px;
      font-family: 'Poppins', sans-serif;
      font-weight: 400;
      outline: none;
      transition: all 0.35s ease;
    }

    .form-input::placeholder {
      color: rgba(165, 180, 252, 0.15);
      font-weight: 300;
    }

    .form-input:hover {
      border-color: rgba(255, 255, 255, 0.10);
      background: rgba(255, 255, 255, 0.05);
    }

    .form-input:focus {
      border-color: rgba(99, 102, 241, 0.25);
      background: rgba(99, 102, 241, 0.04);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.04), 0 0 20px rgba(99, 102, 241, 0.04);
    }

    .form-input:focus ~ .input-border-highlight {
      opacity: 1;
      transform: scaleX(1);
    }

    .input-border-highlight {
      position: absolute;
      bottom: 0;
      left: 14px;
      right: 14px;
      height: 1.5px;
      background: linear-gradient(90deg, rgba(99, 102, 241, 0.3), rgba(168, 85, 247, 0.3), rgba(6, 182, 212, 0.3));
      border-radius: 1px;
      opacity: 0;
      transform: scaleX(0);
      transition: all 0.4s ease;
      transform-origin: left;
      pointer-events: none;
    }

    .password-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(165, 180, 252, 0.25);
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.3s ease;
    }

    .password-toggle:hover {
      color: rgba(165, 180, 252, 0.5);
    }

    .password-toggle svg {
      width: 18px;
      height: 18px;
    }

    .form-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
    }

    .checkbox-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .checkbox-wrapper input[type="checkbox"] {
      display: none;
    }

    .check-box {
      width: 18px;
      height: 18px;
      border-radius: 5px;
      border: 1.5px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.02);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }

    .checkbox-wrapper input:checked + .check-box {
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.4), rgba(168, 85, 247, 0.3));
      border-color: rgba(99, 102, 241, 0.3);
    }

    .check-box svg {
      width: 10px;
      height: 10px;
      opacity: 0;
      transform: scale(0);
      transition: all 0.3s ease;
    }

    .checkbox-wrapper input:checked + .check-box svg {
      opacity: 1;
      transform: scale(1);
    }

    .checkbox-label {
      font-size: 13px;
      color: rgba(165, 180, 252, 0.4);
      font-weight: 400;
    }

    .forgot-link {
      font-size: 13px;
      color: rgba(165, 180, 252, 0.35);
      text-decoration: none;
      transition: color 0.3s ease;
      font-weight: 400;
    }

    .forgot-link:hover {
      color: rgba(99, 102, 241, 0.6);
    }

    .login-btn {
      width: 100%;
      padding: 16px 24px;
      border: none;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Poppins', sans-serif;
      letter-spacing: 1.5px;
      color: #fff;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #6366f1, #8b5cf6, #06b6d4);
      background-size: 200% 200%;
      animation: gradientMove 4s ease-in-out infinite;
      z-index: 1;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .login-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed, #0891b2);
      background-size: 200% 200%;
      animation: gradientMove 4s ease-in-out infinite;
      opacity: 0;
      transition: opacity 0.4s ease;
      z-index: -1;
    }

    .login-btn:hover::before {
      opacity: 1;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(99, 102, 241, 0.25), 0 0 60px rgba(99, 102, 241, 0.08);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    @keyframes gradientMove {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .shimmer {
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.06), transparent);
      animation: shimmerSlide 3s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes shimmerSlide {
      0% { left: -100%; }
      50% { left: 200%; }
      100% { left: 200%; }
    }

    .login-btn.loading {
      pointer-events: none;
      opacity: 0.8;
    }

    .btn-spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    .login-btn.loading .btn-text { display: none; }
    .login-btn.loading .btn-spinner { display: block; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
      position: relative;
      z-index: 1;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.04), transparent);
    }

    .divider-text {
      font-size: 11px;
      font-weight: 500;
      color: rgba(165, 180, 252, 0.2);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .social-btns {
      display: flex;
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    .social-btn {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      background: rgba(255, 255, 255, 0.02);
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: rgba(165, 180, 252, 0.4);
      font-size: 12px;
      font-weight: 500;
      font-family: 'Poppins', sans-serif;
    }

    .social-btn:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.08);
      color: rgba(165, 180, 252, 0.7);
      transform: translateY(-1px);
    }

    .social-btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .signup-section {
      text-align: center;
      margin-top: 24px;
      position: relative;
      z-index: 1;
    }

    .signup-text {
      font-size: 13px;
      color: rgba(165, 180, 252, 0.3);
      font-weight: 400;
    }

    .signup-link {
      color: rgba(99, 102, 241, 0.6);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s ease;
    }

    .signup-link:hover {
      color: rgba(99, 102, 241, 0.9);
    }

    .error-msg {
      display: none;
      padding: 12px 16px;
      border-radius: 12px;
      background: rgba(239, 68, 68, 0.06);
      border: 1px solid rgba(239, 68, 68, 0.1);
      color: rgba(239, 68, 68, 0.7);
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
    }

    .error-msg.show {
      display: block;
      animation: shakeIn 0.4s ease;
    }

    @keyframes shakeIn {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    @media (min-width: 1024px) {
      .phone-wrapper {
        display: block;
      }
    }

    @media (max-width: 480px) {
      .login-card-inner {
        padding: 28px 20px;
        border-radius: 20px;
      }
      .brand-title { font-size: 20px; }
      .brand-icon { width: 48px; height: 48px; }
      .brand-icon svg { width: 24px; height: 24px; }
      .social-btn { font-size: 11px; padding: 10px; }
      .social-btn span { display: none; }
    }

    @media (min-width: 481px) and (max-width: 1023px) {
      .phone-wrapper {
        display: block;
      }
      .phone-3d {
        width: 180px;
        height: 360px;
      }
      .phone-screen {
        top: 32px;
        left: 5px;
        right: 5px;
        bottom: 42px;
        border-radius: 14px;
      }
      .phone-notch {
        top: 10px;
        width: 64px;
        height: 18px;
      }
      .phone-button {
        bottom: 10px;
        width: 72px;
        height: 24px;
      }
      .phone-button-inner {
        width: 16px;
        height: 16px;
      }
      .main-container {
        gap: 30px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="bg-orbs">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>
  <div class="liquid-bubbles" id="bubbles"></div>

  <div class="main-container">
    <div class="phone-wrapper">
      <div class="phone-3d" id="phone3d">
        <div class="phone-glow"></div>
        <div class="phone-body">
          <div class="phone-notch"></div>
          <div class="phone-screen">
            <div class="screen-content">
              <div class="lock-icon">
                <svg viewBox="0 0 24 24">
                  <rect x="5" y="11" width="14" height="10" rx="2"/>
                  <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
                  <circle cx="12" cy="16" r="1.5" fill="currentColor"/>
                </svg>
              </div>
              <div class="unlock-status">UNLOCKING
                <span class="unlock-dots">
                  <span class="unlock-dot"></span>
                  <span class="unlock-dot"></span>
                  <span class="unlock-dot"></span>
                  <span class="unlock-dot"></span>
                  <span class="unlock-dot"></span>
                </span>
              </div>
              <div class="screen-wave">
                <svg viewBox="0 0 200 60" preserveAspectRatio="none">
                  <defs>
                    <linearGradient id="waveGrad" x1="0" y1="0" x2="1" y2="0">
                      <stop offset="0%" stop-color="rgba(99,102,241,0.08)"/>
                      <stop offset="50%" stop-color="rgba(168,85,247,0.08)"/>
                      <stop offset="100%" stop-color="rgba(6,182,212,0.08)"/>
                    </linearGradient>
                  </defs>
                  <path d="M0,30 C30,10 70,50 100,30 C130,10 170,50 200,30 L200,60 L0,60 Z" fill="url(#waveGrad)">
                    <animate attributeName="d" dur="4s" repeatCount="indefinite"
                      values="M0,30 C30,10 70,50 100,30 C130,10 170,50 200,30 L200,60 L0,60 Z;
                              M0,35 C30,50 70,10 100,35 C130,50 170,10 200,35 L200,60 L0,60 Z;
                              M0,30 C30,10 70,50 100,30 C130,10 170,50 200,30 L200,60 L0,60 Z"/>
                  </path>
                  <path d="M0,40 C30,55 70,25 100,40 C130,55 170,25 200,40 L200,60 L0,60 Z" fill="rgba(99,102,241,0.04)">
                    <animate attributeName="d" dur="5s" repeatCount="indefinite"
                      values="M0,40 C30,55 70,25 100,40 C130,55 170,25 200,40 L200,60 L0,60 Z;
                              M0,42 C30,30 70,55 100,42 C130,30 170,55 200,42 L200,60 L0,60 Z;
                              M0,40 C30,55 70,25 100,40 C130,55 170,25 200,40 L200,60 L0,60 Z"/>
                  </path>
                </svg>
              </div>
            </div>
          </div>
          <div class="phone-button">
            <div class="phone-button-inner"></div>
          </div>
        </div>
        <div class="phone-edge phone-edge-left"></div>
        <div class="phone-edge phone-edge-right"></div>
      </div>
    </div>

    <div class="login-card">
      <div class="login-card-inner">
        <div class="brand-section">
          <div class="brand-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="rgba(165,180,252,0.6)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2a4 4 0 0 1 4 4v2a4 4 0 0 1-4 4 4 4 0 0 1-4-4V6a4 4 0 0 1 4-4z"/>
              <path d="M16 14H8a4 4 0 0 0-4 4v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2a4 4 0 0 0-4-4z"/>
              <circle cx="12" cy="7" r="1"/>
            </svg>
          </div>
          <h1 class="brand-title">Mobile Unlocking Service</h1>
          <p class="brand-subtitle">Secure Service Panel Access</p>
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <form id="loginForm" autocomplete="off">
          <div class="form-group">
            <label class="form-label" for="email">Email or Phone</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="M22 4L12 13 2 4"/>
              </svg>
              <input class="form-input" type="text" id="email" placeholder="Enter your email or phone" required>
              <div class="input-border-highlight"></div>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input class="form-input" type="password" id="password" placeholder="Enter your password" required>
              <button type="button" class="password-toggle" id="togglePassword" aria-label="Toggle password visibility">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
              <div class="input-border-highlight"></div>
            </div>
          </div>

          <div class="form-options">
            <label class="checkbox-wrapper">
              <input type="checkbox" id="remember">
              <span class="check-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="rgba(165,180,252,0.6)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="20 6 9 17 4 12"/>
                </svg>
              </span>
              <span class="checkbox-label">Remember me</span>
            </label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>

          <button type="submit" class="login-btn" id="loginBtn">
            <span class="shimmer"></span>
            <span class="btn-text">LOGIN TO PANEL</span>
            <div class="btn-spinner"></div>
          </button>
        </form>

        <div class="divider">
          <span class="divider-line"></span>
          <span class="divider-text">or continue with</span>
          <span class="divider-line"></span>
        </div>

        <div class="social-btns">
          <button class="social-btn" aria-label="Sign in with Google">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            <span>Google</span>
          </button>
          <button class="social-btn" aria-label="Sign in with Apple">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
            </svg>
            <span>Apple</span>
          </button>
          <button class="social-btn" aria-label="Sign in with Facebook">
            <svg viewBox="0 0 24 24" fill="#1877F2">
              <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
            </svg>
            <span>Facebook</span>
          </button>
        </div>

        <div class="signup-section">
          <p class="signup-text">Don&apos;t have an account? <a href="#" class="signup-link">Sign Up</a></p>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      var bubblesContainer = document.getElementById('bubbles');
      var bubbleCount = 20;

      for (var i = 0; i < bubbleCount; i++) {
        var bubble = document.createElement('div');
        bubble.className = 'bubble';
        var size = Math.random() * 60 + 20;
        var left = Math.random() * 100;
        var duration = Math.random() * 18 + 12;
        var delay = Math.random() * 20;
        var drift = (Math.random() - 0.5) * 80;
        var endScale = Math.random() * 0.5 + 0.3;

        bubble.style.width = size + 'px';
        bubble.style.height = size + 'px';
        bubble.style.left = left + '%';
        bubble.style.animationDuration = duration + 's';
        bubble.style.animationDelay = delay + 's';
        bubble.style.setProperty('--drift', drift + 'px');
        bubble.style.setProperty('--end-scale', endScale);

        bubblesContainer.appendChild(bubble);
      }

      var form = document.getElementById('loginForm');
      var loginBtn = document.getElementById('loginBtn');
      var emailInput = document.getElementById('email');
      var passwordInput = document.getElementById('password');
      var errorMsg = document.getElementById('errorMsg');
      var togglePassword = document.getElementById('togglePassword');

      var eyeOpen = '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>';
      var eyeClosed = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';

      togglePassword.addEventListener('click', function() {
        var isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';
        togglePassword.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' +
          (isPassword ? eyeClosed : eyeOpen) + '</svg>';
      });

      function showError(message) {
        errorMsg.textContent = message;
        errorMsg.classList.add('show');
        setTimeout(function() {
          errorMsg.classList.remove('show');
        }, 5000);
      }

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        var email = emailInput.value.trim();
        var password = passwordInput.value.trim();

        if (!email) {
          showError('Please enter your email or phone number.');
          emailInput.focus();
          return;
        }

        if (!password) {
          showError('Please enter your password.');
          passwordInput.focus();
          return;
        }

        if (password.length < 6) {
          showError('Password must be at least 6 characters.');
          passwordInput.focus();
          return;
        }

        loginBtn.classList.add('loading');

        setTimeout(function() {
          loginBtn.classList.remove('loading');
          showError('Connection to server failed. Please try again later.');
        }, 2000);
      });

      var phone3d = document.getElementById('phone3d');

      document.addEventListener('mousemove', function(e) {
        var xAxis = (window.innerWidth / 2 - e.pageX) / 25;
        var yAxis = (window.innerHeight / 2 - e.pageY) / 25;
        phone3d.style.transform = 'rotateY(' + xAxis + 'deg) rotateX(' + yAxis + 'deg)';
      });

      document.addEventListener('mouseleave', function() {
        phone3d.style.transform = '';
      });

      var inputs = document.querySelectorAll('.form-input');
      inputs.forEach(function(input) {
        input.addEventListener('focus', function() {
          this.closest('.input-wrapper').querySelector('.input-icon').style.color = 'rgba(99, 102, 241, 0.6)';
        });
        input.addEventListener('blur', function() {
          this.closest('.input-wrapper').querySelector('.input-icon').style.color = '';
        });
      });

      var socialBtns = document.querySelectorAll('.social-btn');
      socialBtns.forEach(function(btn) {
        btn.addEventListener('click', function() {
          var provider = this.querySelector('span') ? this.querySelector('span').textContent : 'provider';
          loginBtn.classList.add('loading');
          setTimeout(function() {
            loginBtn.classList.remove('loading');
            showError(provider + ' authentication is not available in demo mode.');
          }, 1500);
        });
      });

      var forgotLink = document.querySelector('.forgot-link');
      forgotLink.addEventListener('click', function(e) {
        e.preventDefault();
        showError('Password reset is not available in demo mode.');
      });

      var signupLink = document.querySelector('.signup-link');
      signupLink.addEventListener('click', function(e) {
        e.preventDefault();
        showError('Registration is not available in demo mode.');
      });
    })();
  </script>
</body>
</html>
